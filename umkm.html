<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="gambar/logo.png">
</head>

<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <img src="gambar/logo.png" style="height:40px;">
            <h2>Desa Karangdukuh</h2>
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Beranda</a></li>
            <li><a href="profil.html">Profil</a></li>
            <li><a href="kegiatan.html">Kegiatan</a></li>
            <li><a href="umkm.html" class="active">UMKM</a></li>
        </ul>
    </nav>
</header>

<main class="container">

<h2 class="section-title">Pusat UMKM</h2>

<!-- GRID UMKM -->
<div class="grid-layout">

    <div class="custom-card">
        <div class="card-img-wrapper">
            <img src="gambar/sawah.jpeg" alt="Pertanian" onclick="openImage(this.src)">
        </div>
        <div class="card-body">
            <h3>Pertanian</h3>
            <p>Masyarakat memanfaatkan sektor pertanian sebagai mata pencaharian utama.</p>
        </div>
    </div>

    <div class="custom-card">
        <div class="card-img-wrapper">
            <img src="gambar/ternak.jpg" alt="Peternakan" onclick="openImage(this.src)">
        </div>
        <div class="card-body">
            <h3>Peternakan</h3>
            <p>Usaha peternakan ayam untuk telur konsumsi dan penjualan.</p>
        </div>
    </div>

</div>

</main>

<footer>
    <p>&copy; 2026 Kelurahan Karangdukuh</p>
</footer>

<!-- MODAL FULLSCREEN -->
<div id="imageModal" class="modal" onclick="closeImage()">
    <span class="close">&times;</span>
    <img class="modal-content" id="modalImg">
</div>

<script src="script.js"></script>
